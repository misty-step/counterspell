name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rust:
    name: fmt, clippy, test (core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Formatting is checked across the whole workspace (no build needed), so
      # the desktop crate's style is gated here without pulling Tauri's Linux
      # system deps into this fast job.
      - name: Format
        run: cargo fmt --all -- --check

      # The core `counterspell` package builds/tests with no GUI system deps.
      - name: Test
        run: cargo test -p counterspell

      - name: Clippy
        run: cargo clippy -p counterspell --all-targets -- -D warnings

  desktop:
    name: desktop build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.os }}

      # Tauri v2 Linux system dependencies (webkit2gtk, tray/appindicator, rsvg).
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file

      - name: Build desktop
        run: cargo build --locked -p counterspell-desktop

      - name: Clippy desktop
        run: cargo clippy --locked -p counterspell-desktop --all-targets -- -D warnings

      - name: Test desktop
        run: cargo test --locked -p counterspell-desktop
