name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        id: package
        run: |
          name="counterspell-${GITHUB_REF_NAME}-${{ matrix.target }}"
          stage="$(mktemp -d)/${name}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/counterspell" "$stage/"
          cp README.md ARCHITECTURE.md LICENSE "$stage/"
          tar -C "$(dirname "$stage")" -czf "${name}.tar.gz" "${name}"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading assets to it."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Counterspell ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
