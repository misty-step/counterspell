<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Counterspell - Misty Step product site</title>
    <meta
      name="description"
      content="Counterspell keeps your Fable Claude Code sessions on Fable, automatically."
    />
    <script>
      try {
        var m = localStorage.getItem('ae-mode');
        if (m === 'dark' || m === 'light') {
          document.documentElement.classList.add(m);
          document.documentElement.style.colorScheme = m;
        }
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="aesthetic.css" />
    <link rel="stylesheet" href="marketing.css" />
    <style>
      :root {
        --msk-hero-image: url('assets/hero.jpg');
        --msk-hero-opacity: 0.85;
      }
    </style>
  </head>

    <div class="ae-screen ae-wide msk-hero-screen">
      <div class="msk-hero-bg" aria-hidden="true"></div>

      <header class="ae-bar msk-bar">
        <a class="ae-logo" href="./" aria-label="Counterspell home">
          <span class="ae-app-mark" aria-hidden="true">
            <svg class="ae-icon" data-lucide="wand-sparkles">
              <use href="#i-wand-sparkles" />
            </svg>
          </span>
          <span class="ae-name">COUNTERSPELL</span>
        </a>
        <nav class="ae-chrome msk-nav" aria-label="Site">
          <a href="features.html">features</a>
          <a href="get-started.html">get started</a>
          <a href="changelog.html">changelog</a>
          <a href="https://github.com/misty-step/counterspell">github</a>
        </nav>
      </header>

      <div class="msk-hero-stage">
        <div class="msk-hero-copy">
          <h1 class="msk-hero-title">Keep your Fable sessions on Fable.</h1>
          <p>
            <a class="ae-button" href="get-started.html">Get started</a>
          </p>

      <footer class="ae-bar msk-footer">
        <button class="ae-mode" aria-label="toggle color mode">
          <svg class="ae-icon ae-sun"><use href="#i-sun" /></svg>
          <svg class="ae-icon ae-moon"><use href="#i-moon" /></svg>
        </button>
        <span class="ae-foot-links ae-chrome">
          <span>a <a href="https://mistystep.io">Misty Step</a> project</span>
          <a href="https://github.com/misty-step/counterspell" aria-label="GitHub">
            <svg class="ae-icon" aria-hidden="true"><use href="#i-github" /></svg>
          </a>
        </span>
      </footer>

    <script src="mode.js"></script>
    <script src="theme.js"></script>
